AWSTemplateFormatVersion: "2010-09-09"
Description: "A pipeline for uploading video to YouTube or an S3 bucket"

# This template is separate from the main one and is managed as a sub-deployment in riff-raff.yaml.
# The main app looks up the resources by STAGE relying on the naming convention.

Parameters:
  BuildBucket:
    Description: "The S3 bucket where builds live"
    Type: "String"
  ConfigBucket:
    Description: "The S3 bucket where configuration lives"
    Type: "String"
  App:
    Description: "App name"
    Type: "String"
    Default: "media-atom-pipeline"
  Stack:
    Description: "Stack name"
    Type: "String"
    Default: "media-service"
  Stage:
    Description: "Stage name"
    Type: "String"
    Default: "DEV"
  UploadBucketName:
    Description: "The S3 bucket where videos are uploaded to"
    Type: "String"
  DestinationBucketName:
    Description: "The S3 bucket where transcoded videos are stored"
    Type: "String"
  MediaAtomTable:
    Description: "The Dynamo table where preview media atoms are stored"
    Type: "String"
  ContentAtomArn:
    Description: "ARN of the cross account role to access the content atom kinesis stream"
    Type: "String"
  ManualPlutoTable:
    Description: "The Dynamo table to store videos that must be manually synced with Pluto"
    Type: "String"
  NotificationEmailFrom:
    Description: "email address where notifications of missing pluto ids are sent from"
    Type: "String"
    Default: "digitalcms.dev@guardian.co.uk"
  AlertWebhook:
    Description: "Where CloudWatch alerts are sent"
    Type: "String"
  PlutoSendbackStreamName:
    Description: Name (not ARN) of the Kinesis stream which passes messages back to Pluto
    Type: String
  PlutoSendbackStreamKmsKey:
    Description: ARN of the KMS key used to encrypt messages sent to pluto
    Type: String
  IconikNotificationSQSQueueArn:
    Description: "ARN of the SQS queue to send Iconik notifications to"
    Type: "String"

Conditions:
  CreateProdResources: !Equals [!Ref "Stage", "PROD"]
  CreateCodeResources: !Equals [!Ref "Stage", "CODE"]
  CreateDevResources:  !Equals [!Ref "Stage", "DEV"]

Resources:
  TranscoderCompleteLambdaExecutionRole:
      Type: "AWS::IAM::Role"
      Properties:
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: "sts:AssumeRole"
        Path: "/"
        Policies:
          - PolicyName: "TranscoderCompleteLambdaExecutionPolicy"
            PolicyDocument:
              Statement:
                - Effect: "Allow"
                  Action: [ "logs:CreateLogGroup", "logs:CreateLogStream", "logs:PutLogEvents" ]
                  Resource: "*"
                - Effect: "Allow"
                  Action: [ "states:GetExecutionHistory", "states:SendTaskSuccess" ]
                  Resource:
                    - !If [ CreateProdResources, !Ref VideoPipelinePROD, !If [ CreateCodeResources, !Ref VideoPipelineCODE, !Ref VideoPipelineDEV ] ]
                    - !Sub
                      - "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:${stateMachineName}:*"
                      - stateMachineName: !Select [ 6, !Split [ ":", !If [ CreateProdResources, !Ref VideoPipelinePROD, !If [ CreateCodeResources, !Ref VideoPipelineCODE, !Ref VideoPipelineDEV ] ] ] ]

  LambdaExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: "sts:AssumeRole"
      Path: "/"
      Policies:
        - PolicyName: "LambdaExecutionPolicy"
          PolicyDocument:
            Statement:
              - Effect: "Allow"
                Action: ["logs:CreateLogGroup", "logs:CreateLogStream", "logs:PutLogEvents"]
                Resource: "*"
              - Effect: "Allow"
                Action: ["s3:GetObject"]
                Resource: !Sub ["arn:aws:s3:::${Bucket}/*", { "Bucket": !Ref ConfigBucket }]
              - Effect: "Allow"
                Action: ["s3:*"]
                Resource:
                  - !Sub ["arn:aws:s3:::${Bucket}", { "Bucket": !Ref UploadBucketName }]
                  - !Sub ["arn:aws:s3:::${Bucket}/*", { "Bucket": !Ref UploadBucketName }]
                  - !Sub [ "arn:aws:s3:::${Bucket}", { "Bucket": !Ref DestinationBucketName } ]
                  - !Sub [ "arn:aws:s3:::${Bucket}/*", { "Bucket": !Ref DestinationBucketName } ]
              - Effect: "Allow"
                Action: ["dynamodb:*"]
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${MediaAtomTable}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ManualPlutoTable}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${App}-cache-${Stage}"
              - Effect: "Allow"
                Action: ["elastictranscoder:CreateJob", "elastictranscoder:ReadJob"]
                Resource: "arn:aws:elastictranscoder:*"
              - Effect: "Allow"
                Action: [ "mediaconvert:CreateJob", "mediaconvert:GetJob" ]
                Resource: "*"
              - Effect: "Allow"
                Action: [ "iam:PassRole" ]
                Resource: !GetAtt [ MediaConvertRole, Arn ]
              - Effect: Allow
                Action:
                - ses:SendEmail
                Resource: '*'
                Condition:
                  StringEquals:
                    ses:FromAddress: !Ref 'NotificationEmailFrom'
        - PolicyName: LambdaKinesisAccessPolicy
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource:
                  - !Sub "arn:aws:kinesis:${AWS::Region}:${AWS::AccountId}:stream/${PlutoSendbackStreamName}"
              - Effect: Allow
                Action: kms:GenerateDataKey
                Resource: !Ref PlutoSendbackStreamKmsKey
        - PolicyName: LambdaIconikNotificationSQSAccessPolicy
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !Ref IconikNotificationSQSQueueArn

  ContentAtomCrossAccountPolicyCODE:
    Type: AWS::IAM::Policy
    Condition: CreateCodeResources
    Properties:
      PolicyName: CrossAccountAccessPolicy
      PolicyDocument:
        Statement:
        - Effect: Allow
          Action:
          - sts:AssumeRole
          Resource:
          - !Ref 'ContentAtomArn'
      Roles:
      - !Ref 'LambdaExecutionRole'

  ContentAtomCrossAccountPolicyPROD:
    Type: AWS::IAM::Policy
    Condition: CreateProdResources
    Properties:
      PolicyName: CrossAccountAccessPolicy
      PolicyDocument:
        Statement:
        - Effect: Allow
          Action:
          - sts:AssumeRole
          Resource:
          - !Ref 'ContentAtomArn'
      Roles:
      - !Ref 'LambdaExecutionRole'

  StatesExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
                - !Sub states.${AWS::Region}.amazonaws.com
            Action: "sts:AssumeRole"
      Path: "/"
      Policies:
        - PolicyName: StatesExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "lambda:InvokeFunction"
                Resource: "*"

  EventBridgeExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: "sts:AssumeRole"
      Path: "/"
      Policies:
        - PolicyName: ExecuteTranscoderCompleteLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "lambda:InvokeFunction"
                Resource: !GetAtt [ TranscoderComplete, Arn ]

  MediaConvertRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - "mediaconvert.amazonaws.com"
            Action:
              - sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: "S3AccessPolicy"
          PolicyDocument:
            Statement:
              - Effect: "Allow"
                Action:
                  - "s3:Get*"
                  - "s3:List*"
                Resource:
                  - !Sub [ "arn:aws:s3:::${Bucket}/*", { "Bucket": !Ref UploadBucketName } ]
              - Effect: "Allow"
                Action:
                  - "s3:Put*"
                Resource:
                  - !Sub [ "arn:aws:s3:::${Bucket}/*", { "Bucket": !Ref DestinationBucketName } ]
  
  TranscoderComplete:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName: !Sub "${App}-TranscoderComplete-${Stage}"
      Description: "Resumes the state machine after AWS MediaConvert completes"
      Handler: "com.gu.media.upload.TranscoderComplete::handleRequest"
      Code:
        S3Bucket: !Ref BuildBucket
        S3Key: !Sub
          - "media-service/${Stage}/media-atom-upload-actions/media-atom-uploader.zip"
          - { Stage: !Ref Stage }
      Environment:
        Variables:
          REGION: !Ref AWS::Region
          STACK: !Ref Stack
          APP: !Ref App
          STAGE: !Ref Stage
          CONFIG_BUCKET: !Ref ConfigBucket
          CONFIG_KEY: !Sub
            - "${Stage}/media-atom-maker.private.conf"
            - { Stage: !Ref Stage }
          CREDENTIALS_KEY: !Sub
            - "${Stage}/youtube-service-account.json"
            - { Stage: !Ref Stage }
          ATOM_TABLE_NAME: !Ref 'MediaAtomTable'
          PLUTO_TABLE_NAME: !Ref 'ManualPlutoTable'
          MEDIA_CONVERT_ROLE: !GetAtt MediaConvertRole.Arn
      MemorySize: 2048
      Role: !GetAtt TranscoderCompleteLambdaExecutionRole.Arn
      Runtime: "java21"
      Timeout: 300

  # The following entries are filled in based on the LambdaConfig entries in build.sbt.

  {{GetChunkFromS3}}

  {{UploadChunkToYouTube}}

  {{MultipartCopyChunkInS3}}

  {{CompleteMultipartCopy}}

  {{SendToPluto}}

  {{SendToTranscoderV2}}

  {{AddSubtitlesToMP4}}

  {{AddAssetToAtom}}

  {{AddUploadDataToCache}}

  # Remembers completed uploads since the data is deleted if the pipeline definition is updated
  VideoPipelineCache:
    Type: "AWS::DynamoDB::Table"
    Properties:
      TableName: !Sub "${App}-cache-${Stage}"
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: '5'
        WriteCapacityUnits: '5'
      Tags:
        - Key: devx-backup-enabled
          Value: true

  VideoPipelinePROD:
    Type: "AWS::StepFunctions::StateMachine"
    Condition: CreateProdResources
    Properties:
      DefinitionString:
        !Sub
          - |-
            {{state_machine}}
          -
            {}
      RoleArn: !GetAtt [ StatesExecutionRole, Arn ]

  VideoPipelineCODE:
    Type: "AWS::StepFunctions::StateMachine"
    Condition: CreateCodeResources
    Properties:
      DefinitionString:
        !Sub
          - |-
            {{state_machine}}
          -
            {}
      RoleArn: !GetAtt [ StatesExecutionRole, Arn ]

  VideoPipelineDEV:
    Type: "AWS::StepFunctions::StateMachine"
    Condition: CreateDevResources
    Properties:
      DefinitionString:
        !Sub
          - |-
            {{state_machine}}
          -
            {}
      RoleArn: !GetAtt [ StatesExecutionRole, Arn ]

  MediaConvertCompleteRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "mediaconvert-job-complete-${Stage}"
      EventPattern:
        Fn::Sub: >-
          {"source":["aws.mediaconvert"],"detail-type":["MediaConvert Job State
          Change"],"detail":{"status":["COMPLETE"],"userMetadata":{"stage":["${Stage}"]}}}
      State: ENABLED
      Description: ''
      EventBusName: default
      Targets:
      - Id: lambda
        Arn: !GetAtt [ TranscoderComplete, Arn ]
        RoleArn: !GetAtt [ EventBridgeExecutionRole, Arn ]

  AlertTopic:
    Type: AWS::SNS::Topic
    Condition: CreateProdResources
    Properties:
      DisplayName: !Join ['-', [!Ref 'Stage', Alerts]]
      KmsMasterKeyId: 'alias/aws/sns'
      Subscription:
      - Endpoint: !Ref 'AlertWebhook'
        Protocol: https

  UploadFailedAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: CreateProdResources
    Properties:
      AlarmDescription: Video upload failed
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Threshold: '1'
      Namespace: AWS/States
      MetricName: ExecutionsFailed
      Dimensions:
      - Name: StateMachineArn
        Value: !Ref 'VideoPipelinePROD'
      Period: '60'
      EvaluationPeriods: '1'
      Statistic: Maximum
      AlarmActions:
      - !Ref 'AlertTopic'
